<a
  href="{{ project.url }}"
  class="
    card
    px-6 py-4
    cursor-pointer no-underline
  "
>
  <h2>
    {{ project.title }}
    {% if project.description %} - {{ project.description }}{% endif %}
  </h2>
  <div class="flex gap-2 flex-wrap mt-2">
    {% for tag in project.tags %}
      {% include tag.html name=tag %}
    {% endfor %}
  </div>
</a>
