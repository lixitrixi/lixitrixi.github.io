url: "https://felixleitner.com"
title: "Felix Leitner"

plugins:
  - jekyll-postcss-v2

postcss:
  cache: false

collections_dir: _collections

collections:
  skills:
    output: false
  projects:
    output: true
    permalink: /projects/:slug
  haiku:
    output: true
    permalink: /haiku/:slug

defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "haiku"
    values:
      layout: "haiku"

esbuild:
  bundle: true
  minify: environment
  sourcemap: environment
  files:
    - /assets/js/main.js
